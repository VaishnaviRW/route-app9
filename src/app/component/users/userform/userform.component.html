<div class="col-md-10 offset-md-1">
    <mat-card>
        <mat-card-content>
            <h3 class="font-weight-bold">
                {{isInEditMode ? 'Update User' : 'Add User'}}
            </h3>
            <form [formGroup]="userForm" (ngSubmit)="onUserAdd()">
                <div class="form-group">
                    <label for="userName">UserName</label>
                    <input formControlName="userName" type="text" class="form-control" id="userName">
                </div>
                <div class="form-group">
                    <label for="userRole">UserRole</label>
                    <select formControlName="userRole" type="text" class="form-control" id="userRole">
                        <option value="Candidate">Candidate</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>


                <div class="form-group">
                    <label for="profileDescription">Profile Description</label>
                    <textarea rows="4" formControlName="profileDescription" type="text" class="form-control"
                        id="profileDescription"></textarea>
                </div>
                <div class="form-group">
                    <label for="profileImage">Profile Image</label>
                    <input formControlName="profileImage" type="text" class="form-control" id="profileImage">
                </div>
                <div class="form-group">
                    <label for="experienceYears">Experience Years</label>
                    <select formControlName="experienceYears" type="text" class="form-control" id="experienceYears">
                        <option value="1 to 3 years">1 to 3 years</option>
                        <option value="3 to 5 years">3 to 5 years</option>
                        <option value="5 to 7 years">5 to 7 years</option>
                        <option value="7 to 10 years">7 to 10 years</option>
                        <option value="10+ years">10+ years</option>
                    </select>
                </div>
                <div formArrayName="skills">
                    <h4>Skills</h4>
                    <div class="row" *ngFor="let skill of skillsArr.controls; let i = index">
                        <div class="col-md-10">
                            <input [id]="'skills -'+ i" [formControlName]="i" type="text" class="form-control mb-2">
                        </div>
                        <div class="col-md-2">
                            <button *ngIf="i > 0" 
                                [disabled]="edituser.userRole === 'Candidate'"
                                (click)="onskillremove(i)"  type="button" class="btn btn-sm btn-outline-danger">Remove</button>
                        </div>

                    </div>
                    <div class="row">
                        <div class="col-12">
                            <button [disabled]="formcontrols['skills'].invalid || edituser.userRole === 'Candidate'" (click)="addSkillsControl()"
                                type="button" mat-raised-button color="primary" class="mb-4 mt-3">Add Skills</button>
                        </div>
                    </div>

                </div>
                <div class="form-group">
                    <label for="isActive">IsActive</label>
                    <select formControlName="isActive" type="text" class="form-control" id="isActive">
                        <option [ngValue]="true">IsActive</option>
                        <option [ngValue]="false">In-Active</option>
                    </select>
                </div>

                <div formGroupName="address">
                    <div class="row">
                        <div class="col-md-6">
                            <h4 class="font-weight-bold">Current Address</h4>
                            <div formGroupName="current">
                                <div class="form-group">
                                    <label for="c-country">Country*</label>
                                    <input type="text" formControlName="country" class="form-control" id="c-country">
                                </div>
                                <div class="form-group">
                                    <label for="c-state">State*</label>
                                    <input type="text" formControlName="state" class="form-control" id="c-state">
                                </div>
                                <div class="form-group">
                                    <label for="c-city">City*</label>
                                    <input type="text" formControlName="city" class="form-control" id="c-city">
                                </div>
                                <div class="form-group">
                                    <label for="c-zipcode">ZipCode*</label>
                                    <input type="text" formControlName="zipcode" class="form-control" id="c-zipcode">
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h4 class="font-weight-bold">Permenant Address</h4>
                            <div formGroupName="permanent">
                                <div class="form-group">
                                    <label for="p-country">Country*</label>
                                    <input type="text" formControlName="country" class="form-control" id="p-country">
                                </div>
                                <div class="form-group">
                                    <label for="p-state">State*</label>
                                    <input type="text" formControlName="state" class="form-control" id="p-state">
                                </div>
                                <div class="form-group">
                                    <label for="p-city">City*</label>
                                    <input type="text" formControlName="city" class="form-control" id="p-city">
                                </div>
                                <div class="form-group">
                                    <label for="p-zipcode">ZipCode*</label>
                                    <input type="text" formControlName="zipcode" class="form-control" id="p-zipcode">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-group">
                        <label for="isAddSame">
                            <input type="checkbox" formControlName="isAddSame" id="isAddSame">
                            Current And Permenant Address Are Same.
                        </label>
                    </div>
                </div>
                <button 
                *ngIf="!isInEditMode"
                 type="submit" mat-raised-button color="primary">Add User</button>
                <button 
                *ngIf="isInEditMode"
                [disabled]="edituser.userRole === 'Candidate'"
                 type="button" (click)="Updateuser()" mat-raised-button color="primary">Update User</button>
            </form>
        </mat-card-content>
    </mat-card>
</div>
